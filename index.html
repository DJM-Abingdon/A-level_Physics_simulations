<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magee's Physics Lab Library</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #00d4ff;
            --secondary: #f1c40f;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        h1 { color: var(--accent); margin-bottom: 10px; }

        /* The Grid for your Lab Cards */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 900px;
            width: 90%;
            padding: 20px;
        }

        /* The Card Design */
        .card {
            background: var(--panel);
            border: 2px solid #334155;
            border-radius: 15px;
            padding: 25px;
            text-decoration: none; /* Removes link underline */
            color: inherit;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card h3 { color: var(--secondary); margin: 15px 0 10px 0; }
        .card p { font-size: 0.9rem; color: #94a3b8; line-height: 1.4; }
        .icon { font-size: 40px; }

    </style>
</head>
<body>

    <header>
        <h1>Magee's Physics Lab</h1>
        <p>Interactive simulations for the classroom.</p>
    </header>

    <div class="library-grid">
        
        <a href="energy-levels.html" class="card">
            <div class="icon">⚛️</div>
            <h3>Electron Energy Levels</h3>
            <p>Drag electrons to observe photon emission and absorption gaps.</p>
        </a>

        <a href="photoelectric.html" class="card">
            <div class="icon">🔦</div>
            <h3>Photoelectric Effect</h3>
            <p>Test threshold frequencies and stopping potentials for different metals.</p>
        </a>

        </div>

</body>
</html>
